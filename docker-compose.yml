services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cadence
      POSTGRES_PASSWORD: cadence
      POSTGRES_DB: cadence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0"]
    ports:
      - "8545:8545"

volumes:
  postgres_data:
